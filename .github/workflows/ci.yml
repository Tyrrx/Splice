name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore InterceptorFramework.slnx

    - name: Build
      run: dotnet build InterceptorFramework.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test InterceptorFramework.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

    - name: Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: .NET Test Results
        path: "**/test-results.trx"
        reporter: dotnet-trx
